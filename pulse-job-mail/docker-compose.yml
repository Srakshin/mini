services:
  mongo:
    image: mongo:7
    container_name: pulsejobmail-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:20-alpine
    container_name: pulsejobmail-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/pulsejobmail
      FRONTEND_URL: http://localhost:5173
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  frontend:
    image: node:20-alpine
    container_name: pulsejobmail-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api/v1
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_node_modules:
  frontend_node_modules:
